name: Master System Interface Sync

on:
  schedule:
    - cron: '0 * * * *' # Hourly update
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update-interface:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Gets full history to prevent merge conflicts

      - name: Calculate System Pulse
        run: |
          # 1. Pull latest to avoid conflicts
          git pull origin main
          
          # 2. Generate Time
          IST_TIME=$(TZ='Asia/Kolkata' date +'%Y--%m--%d_%I:%M_%p')
          
          # 3. Define Badge (Escaped for safety)
          NEW_BADGE="<img src=\"https://img.shields.io/badge/LAST_SYNC-____________${IST_TIME}____________-00FFFF?style=for-the-badge\&logo=googlesearchconsole\&logoColor=00FFFF\&labelColor=1F2328\" height=\"110\" />"
          
          # 4. Precise Replace
          sed -i "s|<img src=\"https://img.shields.io/badge/LAST_SYNC.*height=\"110\" />|$NEW_BADGE|" README.md

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "MASTER_SYSTEM_BOT"
          git add README.md
          git commit -m "🛰️ [SYSTEM_PULSE] Metrics Synchronized" || exit 0
          git push origin main